name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: 'Prerelease dist-tag and version suffix (e.g. "beta", "canary", "alpha")'
        required: false
        default: 'beta'
        type: string

env:
  CI: true

permissions:
  contents: read

jobs:
  release:
    name: Release
    if: github.event_name == 'push' && github.repository == 'WebMCP-org/npm-packages'
    timeout-minutes: 15
    runs-on: ubuntu-latest
    environment:
      name: npm-publish
    env:
      NPM_CONFIG_PROVENANCE: 'true'
    permissions:
      contents: write
      pull-requests: write
      id-token: write # Required for npm provenance/OIDC
      attestations: write # Required for SBOM attestations

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Fetch all history for proper changelog generation
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true

      - name: Setup Node.js (for npm registry)
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          registry-url: 'https://registry.npmjs.org'

      - name: Use npm with trusted publishing support
        run: npm install --global npm@11.14.1

      - name: Install dependencies
        run: vp install

      - name: Build packages
        run: pnpm build

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          # Follow conventional commit format for version commits
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
          # Publish command
          publish: pnpm ci:publish
          # Create GitHub releases for each published package
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM
        if: steps.changesets.outputs.published == 'true'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.18.0
        with:
          artifact-name: sbom-${{ github.sha }}.spdx.json
          output-file: ./sbom.spdx.json

      - name: Upload SBOM as release artifact
        if: steps.changesets.outputs.published == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: sbom
          path: ./sbom.spdx.json
          retention-days: 90

      - name: Build and upload MCPB bundles
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          PACKAGES='${{ steps.changesets.outputs.publishedPackages }}'

          # List of packages that produce .mcpb bundles
          MCPB_PACKAGES=("@mcp-b/webmcp-local-relay")

          echo "$PACKAGES" | jq -c '.[]' | while read -r pkg; do
            PKG_NAME=$(echo "$pkg" | jq -r '.name')
            PKG_VERSION=$(echo "$pkg" | jq -r '.version')

            # Check if this package has an MCPB build
            for MCPB_PKG in "${MCPB_PACKAGES[@]}"; do
              if [ "$PKG_NAME" = "$MCPB_PKG" ]; then
                # Derive the package directory from the scoped name
                PKG_DIR="packages/${PKG_NAME#@mcp-b/}"
                echo "Building MCPB bundle for $PKG_NAME@$PKG_VERSION"

                cd "$PKG_DIR"
                pnpm run build:mcpb

                # Derive expected filename from the package name (strip scope)
                BUNDLE_NAME="${PKG_NAME#@mcp-b/}"
                MCPB_FILE="${BUNDLE_NAME}-${PKG_VERSION}.mcpb"

                if [ -f "$MCPB_FILE" ]; then
                  TAG="${PKG_NAME}@${PKG_VERSION}"
                  gh release upload "$TAG" "$MCPB_FILE" --clobber
                  echo "✓ Uploaded $MCPB_FILE to release $TAG"

                  if [ -n "${CLOUDFLARE_API_TOKEN:-}" ]; then
                    pnpm exec wrangler r2 object put \
                      "webmcp-installs/$MCPB_FILE" \
                      --file "$MCPB_FILE" \
                      --content-type application/octet-stream \
                      --cache-control "public, max-age=31536000, immutable" \
                      --remote
                    echo "✓ Uploaded $MCPB_FILE to Cloudflare R2 webmcp-installs"
                  else
                    echo "⚠ CLOUDFLARE_API_TOKEN is not set; skipping R2 upload for $MCPB_FILE"
                  fi
                else
                  echo "⚠ Expected $MCPB_FILE but file not found after build"
                  ls -la *.mcpb 2>/dev/null || echo "  No .mcpb files in directory"
                fi

                cd "$GITHUB_WORKSPACE"
              fi
            done
          done

      - name: Install cosign
        if: steps.changesets.outputs.published == 'true'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v3.8.0

      - name: Sign release artifacts with sigstore
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get published packages from changesets output
          PACKAGES='${{ steps.changesets.outputs.publishedPackages }}'

          # Process each published package
          echo "$PACKAGES" | jq -c '.[]' | while read -r pkg; do
            PKG_NAME=$(echo "$pkg" | jq -r '.name')
            PKG_VERSION=$(echo "$pkg" | jq -r '.version')

            # Convert scoped package name to GitHub release tag format
            # @mcp-b/transports@1.0.0 -> @mcp-b/transports@1.0.0
            TAG="${PKG_NAME}@${PKG_VERSION}"

            echo "Signing release: $TAG"

            # Download the source tarball from the release
            TARBALL_URL=$(gh release view "$TAG" --json tarballUrl -q '.tarballUrl' 2>/dev/null || echo "")

            if [ -n "$TARBALL_URL" ]; then
              TARBALL_FILE="${PKG_NAME//\//-}-${PKG_VERSION}.tar.gz"
              curl -sSfL "$TARBALL_URL" -o "/tmp/$TARBALL_FILE"

              # Sign with cosign (keyless via OIDC)
              cosign sign-blob "/tmp/$TARBALL_FILE" \
                --yes \
                --output-signature "/tmp/${TARBALL_FILE}.sig" \
                --output-certificate "/tmp/${TARBALL_FILE}.pem"

              # Also create bundle for full verification
              cosign sign-blob "/tmp/$TARBALL_FILE" \
                --yes \
                --bundle "/tmp/${TARBALL_FILE}.sigstore"

              # Upload signatures to the release
              gh release upload "$TAG" \
                "/tmp/${TARBALL_FILE}.sig" \
                "/tmp/${TARBALL_FILE}.pem" \
                "/tmp/${TARBALL_FILE}.sigstore" \
                --clobber

              echo "✓ Signed and uploaded signatures for $TAG"
            else
              echo "⚠ No release found for $TAG, skipping"
            fi
          done

  prerelease:
    name: Publish Prerelease
    if: github.event_name == 'workflow_dispatch' && github.repository == 'WebMCP-org/npm-packages'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: npm-publish
    env:
      NPM_CONFIG_PROVENANCE: 'true'
    permissions:
      contents: write # For creating GitHub releases
      id-token: write # For npm trusted publishing and sigstore signing

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true

      - name: Setup Node.js (for npm registry)
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          registry-url: 'https://registry.npmjs.org'

      - name: Use npm with trusted publishing support
        run: npm install --global npm@11.14.1

      - name: Install dependencies
        run: vp install

      - name: Build packages
        run: pnpm build

      - name: Create prerelease versions
        id: versions
        run: |
          TAG_SUFFIX="${{ inputs.tag || 'beta' }}"

          pnpm exec changeset version \
            --snapshot "$TAG_SUFFIX" \
            --snapshot-prerelease-template "{tag}.{datetime}"

          PACKAGES_JSON="[]"
          for pkg in packages/*/; do
            if [ -f "$pkg/package.json" ]; then
              name=$(jq -r '.name' "$pkg/package.json")
              version=$(jq -r '.version' "$pkg/package.json")
              if [[ "$name" != "null" && "$version" == *"-${TAG_SUFFIX}."* ]]; then
                echo "Prepared $name@$version"
                PACKAGES_JSON=$(echo "$PACKAGES_JSON" | jq -c --arg n "$name" --arg v "$version" --arg d "${pkg%/}" '. + [{"name": $n, "version": $v, "dir": $d}]')
              fi
            fi
          done
          echo "packages=$PACKAGES_JSON" >> "$GITHUB_OUTPUT"

      - name: Build prerelease packages
        run: pnpm build

      - name: Publish prerelease packages
        run: |
          pnpm -r --filter './packages/*' publish --access public --tag "${{ inputs.tag || 'beta' }}" --no-git-checks

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v3.8.0

      - name: Create GitHub releases and sign artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGES: ${{ steps.versions.outputs.packages }}
          TAG_SUFFIX: ${{ inputs.tag || 'beta' }}
        run: |
          echo "## Published Prerelease Versions" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "$PACKAGES" | jq -c '.[]' | while read -r pkg; do
            PKG_NAME=$(echo "$pkg" | jq -r '.name')
            PKG_VERSION=$(echo "$pkg" | jq -r '.version')
            PKG_DIR=$(echo "$pkg" | jq -r '.dir')

            echo "- ${PKG_NAME}@${PKG_VERSION}" >> "$GITHUB_STEP_SUMMARY"

            SAFE_NAME=$(echo "${PKG_NAME}-${PKG_VERSION}" | sed 's/@//g' | sed 's/\//-/g')
            GITHUB_TAG="$SAFE_NAME"

            if [ ! -d "$PKG_DIR" ]; then
              echo "::error::Package directory not found for ${PKG_NAME}: ${PKG_DIR}"
              exit 1
            fi

            tar -czf "/tmp/${SAFE_NAME}.tar.gz" -C "$(dirname "$PKG_DIR")" "$(basename "$PKG_DIR")"

            cosign sign-blob "/tmp/${SAFE_NAME}.tar.gz" \
              --yes \
              --bundle "/tmp/${SAFE_NAME}.tar.gz.sigstore"

            cat > /tmp/release-notes.md << NOTES_EOF
          Prerelease of ${PKG_NAME}

          **Install:** npm install ${PKG_NAME}@${TAG_SUFFIX}

          **Verify signature:**
          cosign verify-blob ${SAFE_NAME}.tar.gz --bundle ${SAFE_NAME}.tar.gz.sigstore --certificate-identity-regexp https://github.com/WebMCP-org/npm-packages --certificate-oidc-issuer https://token.actions.githubusercontent.com
          NOTES_EOF

            gh release create "$GITHUB_TAG" \
              --title "${PKG_NAME} ${PKG_VERSION}" \
              --notes-file /tmp/release-notes.md \
              --prerelease \
              --latest=false \
              --target "$GITHUB_SHA" \
              "/tmp/${SAFE_NAME}.tar.gz" \
              "/tmp/${SAFE_NAME}.tar.gz.sigstore"

            echo "  Created signed release ${GITHUB_TAG} for ${PKG_NAME}@${PKG_VERSION}"
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "All packages signed with sigstore (keyless OIDC)" >> "$GITHUB_STEP_SUMMARY"
