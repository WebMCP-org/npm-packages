name: Release

on:
  push:
    branches:
      - main

env:
  CI: true

permissions:
  contents: read

jobs:
  release:
    name: Release
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write # Required for npm provenance/OIDC
      attestations: write # Required for SBOM attestations

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Fetch all history for proper changelog generation
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true

      - name: Setup Node.js (for npm registry)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: vp install

      - name: Build packages
        run: pnpm build

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1
        with:
          # Follow conventional commit format for version commits
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
          # Publish command
          publish: pnpm ci:publish
          # Create GitHub releases for each published package
          createGithubReleases: true
        env:
          # Use PAT if available (allows triggering other workflows)
          # Falls back to GITHUB_TOKEN (won't trigger other workflows)
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          # npm authentication - uses NPM_TOKEN until OIDC is configured
          # To use OIDC: configure trusted publisher on npmjs.com and remove these
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Enable provenance attestations
          NPM_CONFIG_PROVENANCE: true

      - name: Generate SBOM
        if: steps.changesets.outputs.published == 'true'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.18.0
        with:
          artifact-name: sbom-${{ github.sha }}.spdx.json
          output-file: ./sbom.spdx.json

      - name: Upload SBOM as release artifact
        if: steps.changesets.outputs.published == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: sbom
          path: ./sbom.spdx.json
          retention-days: 90

      - name: Build and upload MCPB bundles
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          PACKAGES='${{ steps.changesets.outputs.publishedPackages }}'

          # List of packages that produce .mcpb bundles
          MCPB_PACKAGES=("@mcp-b/webmcp-local-relay")

          echo "$PACKAGES" | jq -c '.[]' | while read -r pkg; do
            PKG_NAME=$(echo "$pkg" | jq -r '.name')
            PKG_VERSION=$(echo "$pkg" | jq -r '.version')

            # Check if this package has an MCPB build
            for MCPB_PKG in "${MCPB_PACKAGES[@]}"; do
              if [ "$PKG_NAME" = "$MCPB_PKG" ]; then
                # Derive the package directory from the scoped name
                PKG_DIR="packages/${PKG_NAME#@mcp-b/}"
                echo "Building MCPB bundle for $PKG_NAME@$PKG_VERSION"

                cd "$PKG_DIR"
                pnpm run build:mcpb

                # Derive expected filename from the package name (strip scope)
                BUNDLE_NAME="${PKG_NAME#@mcp-b/}"
                MCPB_FILE="${BUNDLE_NAME}-${PKG_VERSION}.mcpb"

                if [ -f "$MCPB_FILE" ]; then
                  TAG="${PKG_NAME}@${PKG_VERSION}"
                  gh release upload "$TAG" "$MCPB_FILE" --clobber
                  echo "✓ Uploaded $MCPB_FILE to release $TAG"

                  if [ -n "${CLOUDFLARE_API_TOKEN:-}" ]; then
                    pnpm exec wrangler r2 object put \
                      "webmcp-installs/$MCPB_FILE" \
                      --file "$MCPB_FILE" \
                      --content-type application/octet-stream \
                      --cache-control "public, max-age=31536000, immutable" \
                      --remote
                    echo "✓ Uploaded $MCPB_FILE to Cloudflare R2 webmcp-installs"
                  else
                    echo "⚠ CLOUDFLARE_API_TOKEN is not set; skipping R2 upload for $MCPB_FILE"
                  fi
                else
                  echo "⚠ Expected $MCPB_FILE but file not found after build"
                  ls -la *.mcpb 2>/dev/null || echo "  No .mcpb files in directory"
                fi

                cd "$GITHUB_WORKSPACE"
              fi
            done
          done

      - name: Install cosign
        if: steps.changesets.outputs.published == 'true'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v3.8.0

      - name: Sign release artifacts with sigstore
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get published packages from changesets output
          PACKAGES='${{ steps.changesets.outputs.publishedPackages }}'

          # Process each published package
          echo "$PACKAGES" | jq -c '.[]' | while read -r pkg; do
            PKG_NAME=$(echo "$pkg" | jq -r '.name')
            PKG_VERSION=$(echo "$pkg" | jq -r '.version')

            # Convert scoped package name to GitHub release tag format
            # @mcp-b/transports@1.0.0 -> @mcp-b/transports@1.0.0
            TAG="${PKG_NAME}@${PKG_VERSION}"

            echo "Signing release: $TAG"

            # Download the source tarball from the release
            TARBALL_URL=$(gh release view "$TAG" --json tarballUrl -q '.tarballUrl' 2>/dev/null || echo "")

            if [ -n "$TARBALL_URL" ]; then
              TARBALL_FILE="${PKG_NAME//\//-}-${PKG_VERSION}.tar.gz"
              curl -sSfL "$TARBALL_URL" -o "/tmp/$TARBALL_FILE"

              # Sign with cosign (keyless via OIDC)
              cosign sign-blob "/tmp/$TARBALL_FILE" \
                --yes \
                --output-signature "/tmp/${TARBALL_FILE}.sig" \
                --output-certificate "/tmp/${TARBALL_FILE}.pem"

              # Also create bundle for full verification
              cosign sign-blob "/tmp/$TARBALL_FILE" \
                --yes \
                --bundle "/tmp/${TARBALL_FILE}.sigstore"

              # Upload signatures to the release
              gh release upload "$TAG" \
                "/tmp/${TARBALL_FILE}.sig" \
                "/tmp/${TARBALL_FILE}.pem" \
                "/tmp/${TARBALL_FILE}.sigstore" \
                --clobber

              echo "✓ Signed and uploaded signatures for $TAG"
            else
              echo "⚠ No release found for $TAG, skipping"
            fi
          done
