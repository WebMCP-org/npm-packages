name: E2E Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# Restrict permissions to minimum required
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CI: true

jobs:
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build

      - name: Install Playwright Browsers
        run: pnpm --filter mcp-e2e-tests exec playwright install --with-deps chromium

      - name: Install Puppeteer Chrome (for chrome-devtools-mcp e2e)
        run: pnpm --filter @mcp-b/chrome-devtools-mcp exec puppeteer browsers install chrome

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Run tarball E2E validation (@mcp-b/global)
        run: pnpm test:e2e:tarball:global

      - name: Upload Playwright Report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 30

      - name: Upload Test Results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: test-results
          path: e2e/test-results/
          retention-days: 7

  native-parity:
    name: Native API Parity (${{ matrix.mode }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        mode:
          - default
          - chrome-beta

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build

      - name: Install Playwright Browsers
        run: pnpm --filter mcp-e2e-tests exec playwright install --with-deps chromium

      - name: Install Google Chrome Beta
        if: matrix.mode == 'chrome-beta'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | gpg --dearmor | sudo tee /usr/share/keyrings/google-linux.gpg > /dev/null
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-linux.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-beta
          google-chrome-beta --version

      - name: Run Native Runtime Contract (Default Chromium)
        if: matrix.mode == 'default'
        run: pnpm --filter mcp-e2e-tests run test:native-contract:default

      - name: Run Native Runtime Contract (Chrome Beta)
        if: matrix.mode == 'chrome-beta'
        run: pnpm --filter mcp-e2e-tests run test:native-contract:beta

      - name: Run Native Runtime API Integration (Chrome Beta)
        if: matrix.mode == 'chrome-beta'
        run: pnpm --filter mcp-e2e-tests run test:native-showcase

      - name: Upload Parity Playwright Report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: playwright-report-native-parity-${{ matrix.mode }}
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload Parity Test Results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: test-results-native-parity-${{ matrix.mode }}
          path: e2e/test-results/
          retention-days: 7
