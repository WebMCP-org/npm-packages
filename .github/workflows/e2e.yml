name: E2E Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# Restrict permissions to minimum required
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CI: true

jobs:
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Build packages
        run: pnpm build

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd
        with:
          chrome-version: stable
          install-dependencies: true

      - name: Install Puppeteer Chrome (for chrome-devtools-mcp e2e)
        run: pnpm --filter @mcp-b/chrome-devtools-mcp exec puppeteer browsers install chrome

      - name: Run E2E tests
        env:
          PLAYWRIGHT_CHROMIUM_CHANNEL: chrome
        run: pnpm test:e2e

      - name: Run framework integration E2E tests
        env:
          PLAYWRIGHT_CHROMIUM_CHANNEL: chrome
        run: pnpm test:e2e:frameworks

      - name: Run tarball E2E validation (@mcp-b/global)
        run: pnpm test:e2e:tarball:global

      - name: Upload Playwright Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 30

      - name: Upload Test Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: test-results
          path: e2e/test-results/
          retention-days: 7

  native-parity:
    name: Native API Parity (${{ matrix.mode }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        mode:
          - default
          - chrome-beta

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Build packages
        run: pnpm build

      - name: Setup Chrome
        if: matrix.mode == 'default'
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd
        with:
          chrome-version: stable
          install-dependencies: true

      - name: Install Google Chrome Beta
        if: matrix.mode == 'chrome-beta'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | gpg --dearmor | sudo tee /usr/share/keyrings/google-linux.gpg > /dev/null
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-linux.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-beta
          google-chrome-beta --version

      - name: Run Native Runtime Contract (Default Chromium)
        if: matrix.mode == 'default'
        env:
          PLAYWRIGHT_CHROMIUM_CHANNEL: chrome
        run: pnpm --filter mcp-e2e-tests run test:native-contract:default

      - name: Run Native Runtime API Integration (Default Chromium)
        if: matrix.mode == 'default'
        env:
          PLAYWRIGHT_CHROMIUM_CHANNEL: chrome
          PLAYWRIGHT_NATIVE_SHOWCASE_CHANNEL: chrome
        run: pnpm --filter mcp-e2e-tests run test:native-showcase

      - name: Run Native Runtime Contract (Chrome Beta)
        if: matrix.mode == 'chrome-beta'
        run: pnpm --filter mcp-e2e-tests run test:native-contract:beta

      - name: Run Chrome Beta WebMCP Smoke
        if: matrix.mode == 'chrome-beta'
        run: pnpm --filter mcp-e2e-tests run test:chrome-beta:webmcp:smoke

      - name: Upload Parity Playwright Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-report-native-parity-${{ matrix.mode }}
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload Parity Test Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: test-results-native-parity-${{ matrix.mode }}
          path: e2e/test-results/
          retention-days: 7
