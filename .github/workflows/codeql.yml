name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at midnight UTC
    - cron: '0 0 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@5c3b9c403c9a72fb5fa559496012b60fa351d4b8 # v4
        with:
          languages: javascript-typescript
          # Use extended security queries for better coverage
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@5c3b9c403c9a72fb5fa559496012b60fa351d4b8 # v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@5c3b9c403c9a72fb5fa559496012b60fa351d4b8 # v4
        with:
          category: '/language:javascript-typescript'
